<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form</title>
</head>
<body background="Images\scnenes.jpg" vlink="black">
    <center>
        <h1>Sign Up</h1>
        <div>
        
        <form method="post" action="Study material.html">
            <table >
                <tr>
                    <td><label for="fname">  First Name:</label></td><br>
                    <td><input type="text" id="fname" name="fname"></td>
                </tr>
                <tr>
                    <td><label for="lname">Last name:</label></td><br>
                    <td><input type="text"id="lname" name="lname"></td>
                </tr>
                <tr>
                    <td><label for="ename">E-mail:</label></td>
                    <td><input type="email"id="ename"name="ename"></td>
                </tr>
                <tr>
                    <td><label for="pass1">password:</label></td>
                    <td><input type="password"id="pass1"></td>
                </tr>
                <tr>
                    <td><label for="pass"> confirm password:</label></td>
                    <td><input type="password"id="pass" name="pass"></td>
                </tr>
                <tr>
                    <td><label for="DOB">DOB:</label></td>
                    <td><input type="date"id="DOB"name="DOB"></td>
                </tr>
                <tr>
                    <td><label for="1"for="2">Gender:</label></td>
                    <td><input type="radio"id="1"name="gen"value="Male">Male
                    <input type="radio"id="2"name="gen"value="Female">Female</td>
                </tr>
                
                <tr>
                    <td>city:</td>
                    <td><select name="city">
                        <option value="Pume">Select</option>
                        <option value="Pune">Pune</option>
                        <option value="Pune">Mumbai</option>
                        <option value="Pune">Delhi</option>
                        <option value="Pune">Kolkata</option>
                        </select>
                    </td>
                </tr>

               
                <tr>
                    <td><input type="submit" name="Signin"style="background-color:red"></td>
                    <td><input type="reset" name="Cancel"style="background-color:green"></td>
                </tr>
            </table>
        </form>
    </div>
        <a href="sign in.html">already have an account???</a>
    </center>
</body>
</html>
